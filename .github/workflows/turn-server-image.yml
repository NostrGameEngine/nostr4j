name: TURN Server Image

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '*'
  release:
    types:
      - published

jobs:
  publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME=ghcr.io/${OWNER_LC}/${REPO_LC}-turn-server" >> "$GITHUB_ENV"

      - name: Set up JDK 25 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build TURN server native executable
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :nostr4j-turn-server:buildNativeExecutable

      - name: Build and push snapshot image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./nostr4j-turn-server
          file: ./nostr4j-turn-server/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:snapshot

      - name: Build and push release image
        if: github.event_name == 'release'
        uses: docker/build-push-action@v6
        with:
          context: ./nostr4j-turn-server
          file: ./nostr4j-turn-server/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}
