db = "/app/strfry-db/"

dbParams {
    maxreaders = 256
    mapsize = 1073741824
    noReadAhead = false
}

events {
    maxEventSize = 65536
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 94608000
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}

relay {
    bind = "0.0.0.0"
    port = 8080
    nofiles = 0
    realIpHeader = ""

    info {
        name = "nostr4j local relay"
        description = "Self-contained relay for the nostr4j test suite"
        pubkey = ""
        contact = ""
    }

    maxWebsocketPayloadSize = 131072
    autoPingSeconds = 55
    enableTcpKeepalive = false
    queryTimesliceBudgetMicroseconds = 10000
    maxFilterLimit = 500
    maxSubsPerConnection = 100

    writePolicy { plugin = "" }
    compression {
        enabled = false
        slidingWindow = true
    }
    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
        invalidEvents = true
    }
    numThreads {
        ingester = 2
        reqWorker = 2
        reqMonitor = 1
        negentropy = 1
    }
}
